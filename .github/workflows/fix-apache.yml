# ──────────────────────────────────────────────────────────────────
# TEMPORARY — Disable Nginx (conflicts with Apache) + ensure Apache
# Trigger: manual dispatch only. DELETE after use.
# ──────────────────────────────────────────────────────────────────
name: Fix Apache SSL

on:
  workflow_dispatch:

jobs:
  fix:
    name: Disable Nginx + ensure Apache
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Disable Nginx permanently + restart Apache
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'bash -s' <<'REMOTE_SCRIPT'

          echo "=== Before ==="
          echo "Nginx: $(systemctl is-active nginx 2>/dev/null) / enabled: $(systemctl is-enabled nginx 2>/dev/null)"
          echo "Apache: $(systemctl is-active apache2 2>/dev/null) / enabled: $(systemctl is-enabled apache2 2>/dev/null)"
          ss -tlnp | grep -E ':80 |:443 ' || echo "Nothing on 80/443"

          echo ""
          echo "=== Disable Nginx permanently ==="
          systemctl stop nginx 2>&1 || true
          systemctl disable nginx 2>&1 || true
          systemctl mask nginx 2>&1 || true
          echo "Nginx stopped, disabled, and masked"

          echo ""
          echo "=== Restart Apache ==="
          systemctl restart apache2 2>&1 || true
          sleep 2

          echo ""
          echo "=== After ==="
          echo "Nginx: $(systemctl is-active nginx 2>/dev/null) / enabled: $(systemctl is-enabled nginx 2>/dev/null)"
          echo "Apache: $(systemctl is-active apache2 2>/dev/null) / enabled: $(systemctl is-enabled apache2 2>/dev/null)"
          ss -tlnp | grep -E ':80 |:443 '

          echo ""
          echo "=== Verify sites ==="
          curl -sk -o /dev/null -w "dev.leezr.com  -> HTTP %{http_code}\n" https://dev.leezr.com/ || echo "FAILED"
          curl -sk -o /dev/null -w "leezr.com      -> HTTP %{http_code}\n" https://leezr.com/ || echo "FAILED"
          curl -sk -o /dev/null -w "panel:8081     -> HTTP %{http_code}\n" https://panel.novamoov.com:8081/ || echo "FAILED"

          echo ""
          echo "=== DONE ==="
          REMOTE_SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
